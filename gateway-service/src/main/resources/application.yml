server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI:http://localhost:8084}
              predicates:
                - Path=/auth/**
            - id: order-service
              uri: ${ORDER_SERVICE_URI:http://localhost:8081}
              predicates:
                - Path=/orders/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: order-cb
                    fallbackUri: forward:/fallback/orders
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URI:http://localhost:8082}
              predicates:
                - Path=/products/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: inventory-cb
                    fallbackUri: forward:/fallback/products
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URI:http://localhost:8083}
              predicates:
                - Path=/transactions/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: payment-cb
                    fallbackUri: forward:/fallback/transactions
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    redis-rate-limiter.requestedTokens: 1

  application:
    name: gateway-service
  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - circuitbreakers
          - metrics
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:mySecretKey1234567890123456789012345678901234}

logging:
  level:
    io.github.resilience4j: INFO
    org.springframework.boot.actuator.autoconfigure.opentelemetry: INFO

resilience4j:
  circuitbreaker:
    instances:
      order-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      inventory-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
      payment-cb:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3