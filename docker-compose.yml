networks:
  app-network:
    driver: bridge

services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: inventorydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d inventorydb"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  grafana:
    image: grafana/otel-lgtm:latest
    container_name: grafana
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  config-server:
    image: daniellaera/config-server:latest
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  auth-service:
    image: daniellaera/auth-service:latest
    container_name: auth-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - JWT_SECRET=${JWT_SECRET}
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx150m
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8084/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  order-service:
    image: daniellaera/order-service:latest
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx150m
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  inventory-service:
    image: daniellaera/inventory-service:latest
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - REDIS_HOST=redis
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx150m
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8082/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  payment-service:
    image: daniellaera/payment-service:latest
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx150m
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8083/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  notification-service:
    image: daniellaera/notification-service:latest
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - GMAIL_USERNAME=${GMAIL_USERNAME}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx150m
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8085/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  gateway-service:
    image: daniellaera/gateway-service:latest
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - AUTH_SERVICE_URI=http://auth-service:8084
      - ORDER_SERVICE_URI=http://order-service:8081
      - INVENTORY_SERVICE_URI=http://inventory-service:8082
      - PAYMENT_SERVICE_URI=http://payment-service:8083
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis
      - JAVA_TOOL_OPTIONS=-Xms64m -Xmx150m
    depends_on:
      auth-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  shop-ui:
    image: daniellaera/shop-ui:latest
    container_name: shop-ui
    ports:
      - "80:80"
    depends_on:
      gateway-service:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
  uptime-kuma-data: