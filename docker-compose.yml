networks:
  app-network:
    driver: bridge

services:
  kafka:
    image: apache/kafka:4.2.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: inventorydb
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U testuser -d inventorydb" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/otel-lgtm:latest
    container_name: grafana
    ports:
      - "3000:3000"
      - "4317:4317"
      - "4318:4318"
    networks:
      - app-network

  redis:
    image: redis:8-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  config-server:
    build:
      context: .
      dockerfile: config-server/Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
    networks:
      - app-network
    volumes:
      - ./config-server/src/main/resources/configs:/configs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8888/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  order-service:
    build:
      context: .
      dockerfile: order-service/Dockerfile
    container_name: order-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
      - DB_USER=testuser
      - DB_PASSWORD=testpass
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network

  inventory-service:
    build:
      context: .
      dockerfile: inventory-service/Dockerfile
    container_name: inventory-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
      - DB_USER=testuser
      - DB_PASSWORD=testpass
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - REDIS_HOST=redis
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DB_HOST=postgres
      - DB_USER=testuser
      - DB_PASSWORD=testpass
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - ORDER_SERVICE_URI=http://order-service:8081
      - INVENTORY_SERVICE_URI=http://inventory-service:8082
      - PAYMENT_SERVICE_URI=http://payment-service:8083
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - AUTH_SERVICE_URI=http://auth-service:8084
      - JWT_SECRET=mySecretKey1234567890123456789012345678901234
      - REDIS_HOST=redis
    depends_on:
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      auth-service:
        condition: service_started
      config-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8084:8084"
    environment:
      - DB_HOST=postgres
      - DB_USER=testuser
      - DB_PASSWORD=testpass
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - JWT_SECRET=mySecretKey1234567890123456789012345678901234
    depends_on:
      postgres:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network

  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8085:8085"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
    depends_on:
      kafka:
        condition: service_healthy
      config-server:
        condition: service_healthy
    networks:
      - app-network

  frontend-service:
    build:
      context: .
      dockerfile: frontend-service/Dockerfile
    container_name: frontend-service
    ports:
      - "8090:8090"
    environment:
      - CONFIG_SERVER_URI=http://config-server:8888
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://grafana:4318
      - GATEWAY_URL=http://gateway-service:8080
    depends_on:
      gateway-service:
        condition: service_started
      auth-service:
        condition: service_started
      config-server:
        condition: service_healthy
    networks:
      - app-network

volumes:
  postgres-data: