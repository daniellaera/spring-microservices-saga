<p-toast />
<div class="min-h-screen surface-ground flex align-items-center
            justify-content-center px-3">
  <div style="width:100%; max-width:400px">
    <div class="text-center mb-5">
      <i class="pi pi-shopping-cart text-primary"
         style="font-size:3rem"></i>
      <h1 class="text-3xl font-bold mt-3 mb-1">Online Shop</h1>
      <p class="text-color-secondary m-0">Create your account</p>
    </div>
    <p-card styleClass="shadow-4">
      <div class="flex flex-column gap-4">
        <div class="flex flex-column gap-2">
          <label class="font-medium text-sm">Email</label>
          <input
            pInputText
            [(ngModel)]="email"
            type="email"
            placeholder="you@example.com"
            class="w-full" />
          @if (emailError) {
            <small class="text-red-500">{{ emailError }}</small>
          }
        </div>
        <div class="flex flex-column gap-2">
          <label class="font-medium text-sm">Password</label>
          <p-password
            [(ngModel)]="password"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            placeholder="••••••••" />
        </div>
        <div class="flex flex-column gap-2">
          <label class="font-medium text-sm">Confirm Password</label>
          <p-password
            [(ngModel)]="confirmPassword"
            [feedback]="false"
            [toggleMask]="true"
            styleClass="w-full"
            inputStyleClass="w-full"
            placeholder="••••••••"
            (keyup.enter)="register()" />
          @if (passwordError) {
            <small class="text-red-500">{{ passwordError }}</small>
          }
        </div>
        <p-button
          label="Create account"
          icon="pi pi-user-plus"
          styleClass="w-full"
          size="large"
          [loading]="loading"
          [disabled]="!email.trim() || !password || !confirmPassword"
          (onClick)="register()" />
        <p-divider align="center">
          <span class="text-color-secondary text-sm">
            Already have an account?
          </span>
        </p-divider>
        <p-button
          label="Sign in"
          icon="pi pi-sign-in"
          styleClass="w-full"
          severity="secondary"
          [outlined]="true"
          size="large"
          (onClick)="router.navigate(['/login'])" />
      </div>
    </p-card>
  </div>
</div>
