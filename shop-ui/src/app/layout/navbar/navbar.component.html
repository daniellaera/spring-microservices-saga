<p-toolbar styleClass="shadow-2 border-none px-4"
           style="position:sticky; top:0; z-index:100;
                  background:var(--surface-card);
                  border-bottom:1px solid var(--surface-border)">
  <ng-template pTemplate="start">
    <a routerLink="/dashboard"
       class="flex align-items-center gap-2 no-underline">
      <i class="pi pi-shopping-cart text-primary text-2xl"></i>
      <span class="text-xl font-bold text-color">Online Shop</span>
    </a>
  </ng-template>
  <ng-template pTemplate="end">
    @if (isLoggedIn()) {
      <div class="flex align-items-center gap-3">
        <div style="position:relative; cursor:pointer"
             (click)="clearNotifications()"
             title="Notifications">
          <i class="pi pi-bell text-color" style="font-size:1.2rem"></i>
          @if (notificationCount() > 0) {
            <span style="position:absolute; top:-6px; right:-6px;
                         background:#e74c3c; color:white;
                         border-radius:50%; width:18px; height:18px;
                         font-size:.7rem; font-weight:700;
                         display:flex; align-items:center;
                         justify-content:center">
              {{ notificationCount() > 9 ? '9+' : notificationCount() }}
            </span>
          }
        </div>
        <p-avatar
          [label]="userInitial()"
          shape="circle"
          styleClass="cursor-pointer bg-primary text-white font-bold"
          (click)="userMenu.toggle($event)" />
        <p-menu #userMenu [popup]="true" [model]="menuItems" />
      </div>
    } @else {
      <p-button
        label="Sign in"
        icon="pi pi-sign-in"
        [text]="true"
        routerLink="/login" />
    }
  </ng-template>
</p-toolbar>
