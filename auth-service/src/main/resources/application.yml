server:
  port: 8084

spring:
  application:
    name: auth-service
  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/authdb
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include:
          - health
  endpoint:
    health:
      show-details: always
