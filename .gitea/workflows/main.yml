name: Build and Deploy Online Shop

on:
  push:
    branches: [ main ]

jobs:

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    outputs:
      config-server: 'true'
      auth-service: 'true'
      order-service: 'true'
      inventory-service: 'true'
      payment-service: 'true'
      notification-service: 'true'
      gateway-service: 'true'
      shop-ui: 'true'
    steps:
      - name: Force all pipeline triggers
        run: echo "Bypassing change detection. Forcing all builds."

  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.auth-service == 'true' ||
      needs.detect-changes.outputs.order-service == 'true' ||
      needs.detect-changes.outputs.inventory-service == 'true' ||
      needs.detect-changes.outputs.payment-service == 'true' ||
      needs.detect-changes.outputs.notification-service == 'true' ||
      needs.detect-changes.outputs.gateway-service == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run backend tests
        run: |
          mvn test \
            -pl auth-service,order-service,inventory-service,payment-service,notification-service \
            -am \
            --no-transfer-progress

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: detect-changes
    if: needs.detect-changes.outputs.shop-ui == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install and build
        working-directory: shop-ui
        run: |
          npm ci
          npx ng build --configuration=production

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: [ detect-changes, test-backend, test-frontend ]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------ 1. CONFIG SERVER ------------------
      - name: Build and push config-server
        if: needs.detect-changes.outputs.config-server == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: config-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/config-server:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 2. AUTH SERVICE ------------------
      - name: Build and push auth-service
        if: needs.detect-changes.outputs.auth-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: auth-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/auth-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 3. ORDER SERVICE ------------------
      - name: Build and push order-service
        if: needs.detect-changes.outputs.order-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/order-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 4. INVENTORY SERVICE ------------------
      - name: Build and push inventory-service
        if: needs.detect-changes.outputs.inventory-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: inventory-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/inventory-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 5. PAYMENT SERVICE ------------------
      - name: Build and push payment-service
        if: needs.detect-changes.outputs.payment-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: payment-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/payment-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 6. NOTIFICATION SERVICE ------------------
      - name: Build and push notification-service
        if: needs.detect-changes.outputs.notification-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/notification-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 7. GATEWAY SERVICE ------------------
      - name: Build and push gateway-service
        if: needs.detect-changes.outputs.gateway-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/gateway-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      # ------------------ 8. SHOP UI ------------------
      - name: Build and push shop-ui
        if: needs.detect-changes.outputs.shop-ui == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: shop-ui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/shop-ui:latest

      - name: Final Runner Purge
        if: always()
        run: docker builder prune -f && docker image prune -f

  deploy:
    name: Deploy to infra-node1
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: [ detect-changes, build-and-push ]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Deploy on infra-node1
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            mkdir -p /srv/online-shop
            cd /srv/online-shop
            
            echo "Downloading latest production compose file from Gitea..."
            curl -sSL "http://192.168.1.103:3000/daniellaera/spring-saga-store/raw/branch/main/docker-compose.yml" -o docker-compose.yml
            
            echo "Pulling latest images..."
            docker compose -f docker-compose.yml pull
            
            echo "Restarting updated services..."
            CHANGED=""
            ${{ needs.detect-changes.outputs.config-server == 'true' && 'CHANGED="$CHANGED config-server"' || 'true' }}
            ${{ needs.detect-changes.outputs.auth-service == 'true' && 'CHANGED="$CHANGED auth-service"' || 'true' }}
            ${{ needs.detect-changes.outputs.order-service == 'true' && 'CHANGED="$CHANGED order-service"' || 'true' }}
            ${{ needs.detect-changes.outputs.inventory-service == 'true' && 'CHANGED="$CHANGED inventory-service"' || 'true' }}
            ${{ needs.detect-changes.outputs.payment-service == 'true' && 'CHANGED="$CHANGED payment-service"' || 'true' }}
            ${{ needs.detect-changes.outputs.notification-service == 'true' && 'CHANGED="$CHANGED notification-service"' || 'true' }}
            ${{ needs.detect-changes.outputs.gateway-service == 'true' && 'CHANGED="$CHANGED gateway-service"' || 'true' }}
            ${{ needs.detect-changes.outputs.shop-ui == 'true' && 'CHANGED="$CHANGED shop-ui"' || 'true' }}
            
            if [ -n "$CHANGED" ]; then
              echo "Restarting:$CHANGED"
              docker compose -f docker-compose.yml \
                up -d --no-deps --pull always $CHANGED
            else
              echo "No services changed — skipping restart"
            fi
            
            docker image prune -f
            echo "Deploy complete"