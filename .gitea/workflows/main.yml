name: Build and Deploy Online Shop

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:

  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    outputs:
      config-server: ${{ steps.filter.outputs.config-server }}
      auth-service: ${{ steps.filter.outputs.auth-service }}
      order-service: ${{ steps.filter.outputs.order-service }}
      inventory-service: ${{ steps.filter.outputs.inventory-service }}
      payment-service: ${{ steps.filter.outputs.payment-service }}
      notification-service: ${{ steps.filter.outputs.notification-service }}
      gateway-service: ${{ steps.filter.outputs.gateway-service }}
      shop-ui: ${{ steps.filter.outputs.shop-ui }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            config-server:
              - 'config-server/**'
            auth-service:
              - 'auth-service/**'
            order-service:
              - 'order-service/**'
            inventory-service:
              - 'inventory-service/**'
            payment-service:
              - 'payment-service/**'
            notification-service:
              - 'notification-service/**'
            gateway-service:
              - 'gateway-service/**'
            shop-ui:
              - 'shop-ui/**'

  test-backend:
    name: Test Backend Services
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.auth-service == 'true' ||
      needs.detect-changes.outputs.order-service == 'true' ||
      needs.detect-changes.outputs.inventory-service == 'true' ||
      needs.detect-changes.outputs.payment-service == 'true' ||
      needs.detect-changes.outputs.notification-service == 'true' ||
      needs.detect-changes.outputs.gateway-service == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Run backend tests
        run: |
          mvn test \
            -pl auth-service,order-service,inventory-service,payment-service,notification-service \
            -am \
            --no-transfer-progress

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: detect-changes
    if: needs.detect-changes.outputs.shop-ui == 'true'
    steps:
      - uses: actions/checkout@v4
      - name: Install and build
        working-directory: shop-ui
        run: |
          npm ci
          npx ng build --configuration=production

  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: [ detect-changes, test-backend, test-frontend ]
    if: always() && !failure() && !cancelled()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push config-server
        if: needs.detect-changes.outputs.config-server == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: config-server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/config-server:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push auth-service
        if: needs.detect-changes.outputs.auth-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: auth-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/auth-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push order-service
        if: needs.detect-changes.outputs.order-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: order-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/order-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push inventory-service
        if: needs.detect-changes.outputs.inventory-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: inventory-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/inventory-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push payment-service
        if: needs.detect-changes.outputs.payment-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: payment-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/payment-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push notification-service
        if: needs.detect-changes.outputs.notification-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: notification-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/notification-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push gateway-service
        if: needs.detect-changes.outputs.gateway-service == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: gateway-service/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/gateway-service:latest

      - name: Free up space
        run: docker builder prune -f && docker image prune -f

      - name: Build and push shop-ui
        if: needs.detect-changes.outputs.shop-ui == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: shop-ui/Dockerfile
          platforms: linux/amd64
          push: true
          tags: daniellaera/shop-ui:latest

      - name: Final Runner Purge
        if: always()
        run: docker builder prune -f && docker image prune -f

  deploy:
    name: Deploy to infra-node1
    runs-on: ubuntu-latest
    container: 192.168.1.103:3000/daniellaera/ci-java21-node24:24.04-1
    needs: [ detect-changes, build-and-push ]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Fetch secrets from Infisical and write .env
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p /srv/online-shop

            echo "=== Authenticating with Infisical ==="
            RESPONSE=$(curl -sf -X POST "http://192.168.1.163/api/v1/auth/universal-auth/login" \
              -H "Content-Type: application/json" \
              -d "{\"clientId\":\"${{ secrets.INFISICAL_CLIENT_ID }}\",\"clientSecret\":\"${{ secrets.INFISICAL_CLIENT_SECRET }}\"}")

            TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['accessToken'])")

            if [ -z "$TOKEN" ]; then
              echo "❌ Failed to authenticate with Infisical"
              exit 1
            fi
            echo "✅ Authenticated with Infisical"

            echo "=== Fetching secrets ==="
            curl -sf -X GET \
              "http://192.168.1.163/api/v3/secrets/raw?workspaceId=${{ secrets.INFISICAL_PROJECT_ID }}&environment=prod&secretPath=/" \
              -H "Authorization: Bearer $TOKEN" \
              | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            secrets = data.get('secrets', [])
            with open('/srv/online-shop/.env', 'w') as f:
                for s in secrets:
                    f.write(f\"{s['secretKey']}={s['secretValue']}\n\")
            print(f'✅ Written {len(secrets)} secrets to .env')
            "

      - name: Deploy on infra-node1
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p /srv/online-shop
            cd /srv/online-shop

            echo "=== Downloading latest compose file ==="
            curl -sSf "http://192.168.1.103:3000/daniellaera/spring-saga-store/raw/branch/main/docker-compose.yml" \
              -o docker-compose.yml
            echo "Compose file size: $(wc -c < docker-compose.yml) bytes"

            echo "=== Pulling latest images ==="
            docker compose -f docker-compose.yml pull

            echo "=== Restarting changed services ==="
            CHANGED=""
            ${{ needs.detect-changes.outputs.config-server == 'true' && 'CHANGED="$CHANGED config-server"' || '' }}
            ${{ needs.detect-changes.outputs.auth-service == 'true' && 'CHANGED="$CHANGED auth-service"' || '' }}
            ${{ needs.detect-changes.outputs.order-service == 'true' && 'CHANGED="$CHANGED order-service"' || '' }}
            ${{ needs.detect-changes.outputs.inventory-service == 'true' && 'CHANGED="$CHANGED inventory-service"' || '' }}
            ${{ needs.detect-changes.outputs.payment-service == 'true' && 'CHANGED="$CHANGED payment-service"' || '' }}
            ${{ needs.detect-changes.outputs.notification-service == 'true' && 'CHANGED="$CHANGED notification-service"' || '' }}
            ${{ needs.detect-changes.outputs.gateway-service == 'true' && 'CHANGED="$CHANGED gateway-service"' || '' }}
            ${{ needs.detect-changes.outputs.shop-ui == 'true' && 'CHANGED="$CHANGED shop-ui"' || '' }}

            if [ -n "$CHANGED" ]; then
              echo "Restarting: $CHANGED"
              docker compose -f docker-compose.yml \
                up -d --no-deps --pull always $CHANGED
            else
              echo "No services changed — skipping restart"
            fi

            echo "=== Cleaning up ==="
            docker container prune -f
            docker image prune -a -f

            echo "=== Disk usage after cleanup ==="
            df -h /

            echo "=== Running containers ==="
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

            echo "=== Deploy complete ==="