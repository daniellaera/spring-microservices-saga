<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="products-body">
  <tr th:each="p : ${products}">
    <td th:text="${p.name}"></td>
    <td th:text="${p.quantity}"></td>
    <td th:text="${p.price != null ? #numbers.formatDecimal(p.price, 1, 2) + ' €' : '—'}"></td>
  </tr>
  <tr th:if="${#lists.isEmpty(products)}">
    <td colspan="3" class="empty">No products yet</td>
  </tr>
</th:block>
</body>
</html>
