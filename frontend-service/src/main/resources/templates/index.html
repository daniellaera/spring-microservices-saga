<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Online Shop</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
        header { background: #534AB7; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        header h1 { font-size: 1.2rem; }
        header .role-badge { font-size: 0.75rem; background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px; margin-left: 10px; }
        header a { color: white; font-size: 0.85rem; opacity: 0.8; text-decoration: none; }
        header a:hover { opacity: 1; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .container.admin { grid-template-columns: 1fr 1fr; }
        .full-width { grid-column: 1 / -1; }
        .card { background: white; border-radius: 12px; padding: 1.5rem; box-shadow: 0 1px 6px rgba(0,0,0,0.06); }
        h2 { font-size: 1rem; margin-bottom: 1rem; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 0.5rem; color: #888; font-weight: 500; border-bottom: 1px solid #eee; }
        td { padding: 0.5rem; border-bottom: 1px solid #f5f5f5; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
        .badge.CONFIRMED { background: #EAF3DE; color: #27500A; }
        .badge.CANCELLED { background: #FCEBEB; color: #791F1F; }
        .badge.FAILED { background: #FCEBEB; color: #791F1F; }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: 0.5; }
        }
        .badge.PENDING { background: #FAEEDA; color: #633806; animation: pulse 1.5s ease-in-out infinite; }
        .badge.COMPENSATED { background: #EEF0FA; color: #534AB7; font-size: 0.7rem; margin-left: 4px; }
        .badge-role { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-role.ADMIN { background: #EAF3DE; color: #27500A; }
        .badge-role.USER { background: #EEF0FA; color: #534AB7; }
        label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; margin-top: 0.8rem; }
        input, select { width: 100%; padding: 0.5rem 0.8rem; border: 1px solid #ddd; border-radius: 8px; font-size: 0.9rem; }
        button { margin-top: 1rem; padding: 0.6rem 1.2rem; background: #534AB7; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem; }
        button:hover { background: #3C3489; }
        .empty { color: #aaa; font-size: 0.85rem; text-align: center; padding: 1rem 0; }
    </style>
</head>
<body>
<header>
    <h1>Online Shop <span class="badge-role" th:classappend="${role}" th:text="${role}"></span></h1>
    <a href="/logout">Sign out</a>
</header>

<div class="container">

    <!-- Orders — visible for everyone -->
    <div class="card">
        <h2>Orders</h2>
        <table>
            <thead>
            <tr><th>ID</th><th>Product</th><th>Qty</th><th>Price</th><th>Total</th><th>Status</th></tr>
            </thead>
            <tbody
                id="orders-body"
                hx-get="/orders/partial"
                hx-trigger="every 3s"
                hx-swap="innerHTML"
                hx-target="#orders-body">
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}"></td>
                <td th:text="${order.productName}"></td>
                <td th:text="${order.quantity}"></td>
                <td th:text="${order.price != null ? #numbers.formatDecimal(order.price, 1, 2) + ' €' : '—'}">—</td>
                <td th:text="${order.totalAmount != null ? #numbers.formatDecimal(order.totalAmount, 1, 2) + ' €' : '—'}">—</td>
                <td>
                    <span class="badge" th:classappend="${order.status}"
                          th:text="${order.status}"></span>
                    <span class="badge COMPENSATED"
                          th:if="${order.status == 'CANCELLED'}"
                          title="Stock restored automatically">↩ restored</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(orders)}">
                <td colspan="6" class="empty">No orders yet</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Place an order — USER only -->
    <div class="card" th:if="${role == 'USER'}">
        <h2>Place an order</h2>
        <form method="post" action="/orders">
            <label>Product</label>
            <select name="productName">
                <option th:each="p : ${products}"
                        th:value="${p.name}"
                        th:data-price="${p.price}"
                        th:text="${p.name + ' — ' + p.price + ' € (' + p.quantity + ' in stock)'}">
                </option>
            </select>
            <label>Quantity</label>
            <input type="number" name="quantity" value="1" min="1"/>
            <div style="margin-top:.8rem; padding:.6rem; background:#f5f5f5; border-radius:8px; font-size:.85rem; color:#555">
                Estimated total: <strong id="estimated-total">—</strong>
            </div>
            <input type="hidden" name="price" id="price-input"/>
            <button type="submit">Place order</button>
        </form>
        <script>
            const select = document.querySelector('select[name=productName]');
            const qty = document.querySelector('input[name=quantity]');
            const total = document.getElementById('estimated-total');
            const priceInput = document.getElementById('price-input');

            function updateTotal() {
                const price = parseFloat(
                    select.options[select.selectedIndex]?.dataset.price || 0
                );
                const q = parseInt(qty.value || 1);
                const amount = (price * q).toFixed(2);
                total.textContent = amount + ' €';
                priceInput.value = price;
            }

            select.addEventListener('change', updateTotal);
            qty.addEventListener('input', updateTotal);
            updateTotal();
        </script>
    </div>

    <!-- ADMIN section -->
    <div th:if="${role == 'ADMIN'}" style="display: contents;">

        <!-- Products list -->
        <div class="card">
            <h2>Products</h2>
            <table>
                <thead>
                <tr><th>Name</th><th>Stock</th><th>Price</th></tr>
                </thead>
                <tbody
                    id="products-body"
                    hx-get="/products/partial"
                    hx-trigger="every 3s"
                    hx-swap="innerHTML"
                    hx-target="#products-body">
                <tr th:each="p : ${products}">
                    <td th:text="${p.name}"></td>
                    <td th:text="${p.quantity}"></td>
                    <td th:text="${p.price != null ? #numbers.formatDecimal(p.price, 1, 2) + ' €' : '—'}"></td>
                </tr>
                <tr th:if="${#lists.isEmpty(products)}">
                    <td colspan="3" class="empty">No products yet</td>
                </tr>
                </tbody>
            </table>
        </div>

        <!-- Add a product -->
        <div class="card">
            <h2>Add a product</h2>
            <form method="post" action="/products">
                <label>Name</label>
                <input type="text" name="name" placeholder="MacBook Pro" required/>
                <label>Quantity</label>
                <input type="number" name="quantity" value="10" min="1"/>
                <label>Price (€)</label>
                <input type="number" name="price" placeholder="999.99" step="0.01" min="0" required/>
                <button type="submit">Add product</button>
            </form>
        </div>

    </div>

</div>
</body>
</html>
