server:
  port: 8083

spring:
  application:
    name: payment-service
  config:
    import: "configserver:${CONFIG_SERVER_URI:http://localhost:8888}"

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    listener:
      ack-mode: record
    consumer:
      auto-offset-reset: earliest
    retry:
      topic:
        attempts: 3
        enabled: true
        backoff:
          delay: 1000
          multiplier: 2.0
          max-delay: 10000

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/paymentdb

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include:
          - health
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.boot.actuator.autoconfigure.opentelemetry: INFO